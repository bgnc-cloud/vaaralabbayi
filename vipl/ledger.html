<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ledger Entry — VIPL Internal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../logo.jpg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 24px; }
  .card h2 { font-family:'Plus Jakarta Sans',sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; }
  .entryForm { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; align-items: end; }
  .entryForm label { font-size: 12px; font-weight: 700; color: var(--g3); display: block; margin-bottom: 4px; }
  .entryForm input, .entryForm select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
  .entryForm button { padding: 11px 20px; border-radius: 8px; background: var(--orange); color: #fff; border: none; font-weight: 700; cursor: pointer; height: 42px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { background: var(--blue); color: #fff; padding: 10px; text-align: left; font-size: 11px; text-transform: uppercase; }
  td { padding: 10px; border-bottom: 1px solid var(--border); }
  .balPos { color: var(--green); font-weight: 700; }
  .balNeg { color: #C0392B; font-weight: 700; }
  .summaryGrid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 14px; margin-bottom: 24px; }
  .summaryBox { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
  .summaryBox .val { font-family:'Plus Jakarta Sans',sans-serif; font-size: 24px; font-weight: 800; }
  .summaryBox .lbl { font-size: 12px; color: var(--g3); margin-top: 4px; }
  #noAccess { text-align: center; padding: 60px 20px; color: var(--g3); }

  .fySelector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .fyPill { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--ink); }
  .fyPill.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .monthAccordion { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .monthHeader { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--off); cursor: pointer; user-select: none; }
  .monthHeader .monthTitle { font-weight: 800; font-size: 14.5px; display: flex; align-items: center; gap: 8px; }
  .monthHeader .chevron { transition: transform .15s; font-size: 11px; color: var(--g3); }
  .monthHeader.open .chevron { transform: rotate(90deg); }
  .monthHeader .monthStats { font-size: 12.5px; color: var(--g3); display: flex; gap: 16px; }
  .monthHeader .monthStats b { color: var(--ink); }
  .monthBody { display: none; overflow-x: auto; }
  .monthBody.open { display: block; }
  .fyControls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
  .expandAllBtn { font-size: 12.5px; font-weight: 700; color: var(--blue); background: none; border: none; cursor: pointer; padding: 6px 10px; }
  .partyTag { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 5px; background: var(--off); color: var(--g3); }
</style>
</head>
<body>

<div id="authBox"></div>

<div id="appShell">
  <div id="sidebar"></div>
  <div id="mainArea">
    <h1 class="pageTitle">Ledger Entry</h1>
    <div id="pageContent"></div>
  </div>
</div>

<script src="shell.js"></script>
<script>
  function fmt(n) { return '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits:2}); }
  const ALLOWED_ROLES = ['super_admin','accountant','entry'];
  const PARTY_TYPE_LABELS = { investor: 'Investor', employee: 'Employee', lender: 'Lender', subscriber: 'Subscriber', vendor: 'Vendor', other: 'Other' };
  let allProfiles = [];

  // ── Financial Year helpers (India: Apr 1 – Mar 31) ──
  function fyKeyOf(dateStr) {
    const d = new Date(dateStr);
    const m = d.getMonth() + 1, y = d.getFullYear();
    return m >= 4 ? y : y - 1; // FY start year
  }
  function fyLabelOf(fyStartYear) {
    return `FY ${fyStartYear}–${String(fyStartYear + 1).slice(2)}`;
  }
  function monthKeyOf(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  function monthLabelOf(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
  }

  let allEntries = [];
  let selectedFY = null;
  let openMonths = new Set();

  window.onVIPLReady = async function() {
    const role = VIPL.profile.role;
    if (!ALLOWED_ROLES.includes(role)) {
      document.getElementById('pageContent').innerHTML = '<div id="noAccess">🔒 No access to this page.</div>';
      return;
    }

    document.getElementById('pageContent').innerHTML = `
      <div class="summaryGrid">
        <div class="summaryBox"><div class="val" id="sumCash">₹0</div><div class="lbl">Cash Balance</div></div>
        <div class="summaryBox"><div class="val" id="sumBank">₹0</div><div class="lbl">Bank Balance</div></div>
        <div class="summaryBox"><div class="val" id="sumEntries">0</div><div class="lbl">Total Entries</div></div>
      </div>
      <div class="card">
        <h2>New Entry</h2>
        <div class="entryForm">
          <div><label>Date</label><input type="date" id="fDate"></div>
          <div><label>Particulars *</label><input type="text" id="fParticulars" placeholder="e.g. Rent for month of Jul-26"></div>
          <div><label>Description (category)</label><input type="text" id="fDescription" placeholder="e.g. monthly rent, salary, invest"></div>
          <div><label>Type</label>
            <select id="fType">
              <option value="cash_credit">Cash In</option>
              <option value="cash_debit">Cash Out</option>
              <option value="bank_credit">Bank In</option>
              <option value="bank_debit">Bank Out</option>
            </select>
          </div>
          <div><label>Amount (₹) *</label><input type="number" id="fAmount" placeholder="0.00" step="0.01"></div>
          <div><label>Cheque No.</label><input type="text" id="fCheque" placeholder="Optional"></div>
          <div><label>Relates to (optional)</label>
            <select id="fPartyType" onchange="onPartyTypeChange()">
              <option value="">— Not linked to a person —</option>
              <option value="investor">Investor</option>
              <option value="employee">Employee</option>
              <option value="lender">Lender</option>
              <option value="subscriber">Subscriber</option>
              <option value="vendor">Vendor</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div id="fPartyPersonWrap" style="display:none">
            <label>Person</label>
            <select id="fPartyPerson"><option value="">Select…</option></select>
          </div>
          <div><button onclick="addEntry()">Add Entry</button></div>
        </div>
        <div id="formMsg" style="margin-top:10px;font-size:13px"></div>
      </div>
      <div class="card">
        <h2>Financial Year</h2>
        <div class="fySelector" id="fySelector"></div>
        <div class="fyControls">
          <div class="sub" style="font-size:13px;color:var(--g3)" id="fySummaryLine"></div>
          <button class="expandAllBtn" id="expandAllBtn" onclick="toggleAllMonths()">Expand all</button>
        </div>
      </div>
      <div class="card">
        <h2>Ledger — by Month</h2>
        <div id="monthAccordions"><div style="text-align:center;color:var(--g3);padding:30px">Loading…</div></div>
      </div>
    `;
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    await loadProfilesForParty();
    loadLedger();
  };

  async function loadProfilesForParty() {
    const { data } = await VIPL.sb.from('profiles').select('id, full_name, email, role').neq('role', 'pending');
    allProfiles = data || [];
  }

  function onPartyTypeChange() {
    const type = document.getElementById('fPartyType').value;
    const wrap = document.getElementById('fPartyPersonWrap');
    if (!type) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    document.getElementById('fPartyPerson').innerHTML = '<option value="">Select…</option>' +
      allProfiles.map(p => `<option value="${p.id}">${escapeHtml(p.full_name || p.email)}</option>`).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function addEntry() {
    const particulars = document.getElementById('fParticulars').value.trim();
    const amount = parseFloat(document.getElementById('fAmount').value);
    const type = document.getElementById('fType').value;
    const partyType = document.getElementById('fPartyType').value || null;
    const partyProfileId = document.getElementById('fPartyPerson') ? (document.getElementById('fPartyPerson').value || null) : null;
    const msg = document.getElementById('formMsg');
    if (!particulars || !amount || amount <= 0) {
      msg.style.color = '#C0392B'; msg.textContent = 'Particulars and a valid amount are required.'; return;
    }
    const row = {
      entry_date: document.getElementById('fDate').value,
      particulars,
      description: document.getElementById('fDescription').value || null,
      cheque_no: document.getElementById('fCheque').value || null,
      created_by: VIPL.user.id,
      cash_credit: 0, cash_debit: 0, bank_credit: 0, bank_debit: 0,
      party_type: partyType,
      party_profile_id: partyType ? partyProfileId : null
    };
    row[type] = amount;
    const { error } = await VIPL.sb.from('ledger_entries').insert(row);
    if (error) { msg.style.color = '#C0392B'; msg.textContent = error.message; return; }
    msg.style.color = 'var(--green)'; msg.textContent = 'Entry added.';
    document.getElementById('fParticulars').value = '';
    document.getElementById('fDescription').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fCheque').value = '';
    document.getElementById('fPartyType').value = '';
    document.getElementById('fPartyPersonWrap').style.display = 'none';
    loadLedger();
  }

  async function loadLedger() {
    const { data, error } = await VIPL.sb.from('ledger_with_balance').select('*').order('entry_date').order('created_at');
    if (error) {
      document.getElementById('monthAccordions').innerHTML = '<div style="color:#C0392B;padding:20px">' + error.message + '</div>';
      return;
    }
    allEntries = data || [];
    if (!allEntries.length) {
      document.getElementById('monthAccordions').innerHTML = '<div style="text-align:center;color:var(--g3);padding:30px">No entries yet.</div>';
      return;
    }

    const last = allEntries[allEntries.length - 1];
    document.getElementById('sumCash').textContent = fmt(last.cash_balance);
    document.getElementById('sumBank').textContent = fmt(last.bank_balance);
    document.getElementById('sumEntries').textContent = allEntries.length;

    // Build FY list, newest first
    const fySet = new Set(allEntries.map(e => fyKeyOf(e.entry_date)));
    const fyList = Array.from(fySet).sort((a,b) => b - a);
    selectedFY = fyList[0]; // default to most recent FY

    document.getElementById('fySelector').innerHTML = fyList.map(fy => `
      <button class="fyPill${fy === selectedFY ? ' active' : ''}" onclick="selectFY(${fy})">${fyLabelOf(fy)}</button>
    `).join('');

    renderMonths();
  }

  function selectFY(fy) {
    selectedFY = fy;
    openMonths = new Set();
    document.querySelectorAll('.fyPill').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === fyLabelOf(fy));
    });
    renderMonths();
  }

  function renderMonths() {
    const fyEntries = allEntries.filter(e => fyKeyOf(e.entry_date) === selectedFY);

    // Group by month, preserving chronological order
    const monthMap = new Map();
    fyEntries.forEach(e => {
      const key = monthKeyOf(e.entry_date);
      if (!monthMap.has(key)) monthMap.set(key, []);
      monthMap.get(key).push(e);
    });
    const monthKeys = Array.from(monthMap.keys()).sort();

    // FY-level summary line
    const fyCashIn = fyEntries.reduce((s,e) => s + Number(e.cash_credit||0), 0);
    const fyCashOut = fyEntries.reduce((s,e) => s + Number(e.cash_debit||0), 0);
    const fyBankIn = fyEntries.reduce((s,e) => s + Number(e.bank_credit||0), 0);
    const fyBankOut = fyEntries.reduce((s,e) => s + Number(e.bank_debit||0), 0);
    document.getElementById('fySummaryLine').innerHTML =
      `${fyLabelOf(selectedFY)}: ${fyEntries.length} entries · Cash In ${fmt(fyCashIn)} · Cash Out ${fmt(fyCashOut)} · Bank In ${fmt(fyBankIn)} · Bank Out ${fmt(fyBankOut)}`;

    // Open the most recent month by default
    if (monthKeys.length) openMonths.add(monthKeys[monthKeys.length - 1]);

    document.getElementById('monthAccordions').innerHTML = monthKeys.map(key => {
      const entries = monthMap.get(key);
      const label = monthLabelOf(entries[0].entry_date);
      const cashIn = entries.reduce((s,e) => s + Number(e.cash_credit||0), 0);
      const cashOut = entries.reduce((s,e) => s + Number(e.cash_debit||0), 0);
      const bankIn = entries.reduce((s,e) => s + Number(e.bank_credit||0), 0);
      const bankOut = entries.reduce((s,e) => s + Number(e.bank_debit||0), 0);
      const closingCash = entries[entries.length-1].cash_balance;
      const closingBank = entries[entries.length-1].bank_balance;
      const isOpen = openMonths.has(key);

      const rows = entries.map(r => `
        <tr>
          <td>${r.entry_date}</td><td>${r.particulars}</td><td>${r.description || '—'}</td>
          <td>${r.cash_credit ? fmt(r.cash_credit) : '—'}</td><td>${r.cash_debit ? fmt(r.cash_debit) : '—'}</td>
          <td>${r.bank_credit ? fmt(r.bank_credit) : '—'}</td><td>${r.bank_debit ? fmt(r.bank_debit) : '—'}</td>
          <td>${r.cheque_no || '—'}</td>
          <td class="${r.cash_balance >= 0 ? 'balPos' : 'balNeg'}">${fmt(r.cash_balance)}</td>
          <td class="${r.bank_balance >= 0 ? 'balPos' : 'balNeg'}">${fmt(r.bank_balance)}</td>
          <td>${r.created_by_name || '—'}</td>
          <td>${r.party_type ? `<span class="partyTag">${PARTY_TYPE_LABELS[r.party_type] || r.party_type}</span> ${r.party_name || ''}` : '—'}</td>
        </tr>`).join('');

      return `
        <div class="monthAccordion">
          <div class="monthHeader${isOpen ? ' open' : ''}" onclick="toggleMonth('${key}')">
            <div class="monthTitle"><span class="chevron">▶</span> ${label} <span style="color:var(--g3);font-weight:600">(${entries.length})</span></div>
            <div class="monthStats">
              <span>Cash In <b>${fmt(cashIn)}</b></span>
              <span>Cash Out <b>${fmt(cashOut)}</b></span>
              <span>Closing Cash <b class="${closingCash >= 0 ? 'balPos' : 'balNeg'}">${fmt(closingCash)}</b></span>
              <span>Closing Bank <b class="${closingBank >= 0 ? 'balPos' : 'balNeg'}">${fmt(closingBank)}</b></span>
            </div>
          </div>
          <div class="monthBody${isOpen ? ' open' : ''}" id="monthBody-${key}">
            <table>
              <thead><tr><th>Date</th><th>Particulars</th><th>Description</th><th>Cash In</th><th>Cash Out</th><th>Bank In</th><th>Bank Out</th><th>Cheque</th><th>Cash Bal</th><th>Bank Bal</th><th>By</th><th>Linked to</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }).join('');
  }

  function toggleMonth(key) {
    const header = document.querySelector(`#monthBody-${key}`).previousElementSibling;
    const body = document.getElementById(`monthBody-${key}`);
    const isOpen = body.classList.toggle('open');
    header.classList.toggle('open', isOpen);
    if (isOpen) openMonths.add(key); else openMonths.delete(key);
  }

  function toggleAllMonths() {
    const bodies = document.querySelectorAll('.monthBody');
    const anyClosed = Array.from(bodies).some(b => !b.classList.contains('open'));
    bodies.forEach(b => {
      b.classList.toggle('open', anyClosed);
      b.previousElementSibling.classList.toggle('open', anyClosed);
    });
    document.getElementById('expandAllBtn').textContent = anyClosed ? 'Collapse all' : 'Expand all';
  }
</script>
</body>
</html>
